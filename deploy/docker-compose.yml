services:
  api:
    build:
      context: ../backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
      PORT: "3001"
    volumes:
      - budget-data:/data
    expose:
      - "3001"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  budget-data:
  caddy-data:
  caddy-config:
